<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Dashboard — Encuesta MSoluciones</title>
<style>
  :root{
    --verde-oscuro:#1f5c3a;
    --verde:#2f8557;
    --verde-claro:#e6f2ea;
    --ambar:#e0a437;
    --rojo:#d1554a;
    --gris-900:#1c2422;
    --gris-600:#5b6a64;
    --gris-300:#dfe6e2;
    --gris-100:#f5f8f6;
    --white:#ffffff;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;background:var(--gris-100);
    font-family:'Segoe UI', -apple-system, Roboto, sans-serif;
    color:var(--gris-900);padding:28px;
  }
  .wrap{max-width:1180px;margin:0 auto;}

  .topbar{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px;flex-wrap:wrap;gap:14px;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-mark{height:48px;width:auto;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .brand-mark img{height:100%;width:auto;object-fit:contain;}
  .brand-text h1{margin:0;font-size:19px;letter-spacing:-0.01em;}
  .brand-text p{margin:2px 0 0;font-size:12.5px;color:var(--gris-600);}
  .period{font-size:12px;color:var(--gris-600);background:var(--white);border:1px solid var(--gris-300);padding:7px 12px;border-radius:8px;display:flex;align-items:center;gap:8px;}
  .refresh-btn{background:var(--verde);color:white;border:none;border-radius:8px;padding:8px 14px;font-size:12.5px;font-weight:600;cursor:pointer;}
  .refresh-btn:hover{background:var(--verde-oscuro);}

  .filters{display:flex;gap:14px;align-items:center;flex-wrap:wrap;background:var(--white);border:1px solid var(--gris-300);border-radius:12px;padding:12px 16px;margin-bottom:18px;}
  .filtro-grupo{display:flex;align-items:center;gap:8px;}
  .filters .label{font-size:12px;font-weight:600;color:var(--gris-600);text-transform:uppercase;letter-spacing:.04em;margin-right:4px;}
  .chip-group{display:flex;gap:6px;flex-wrap:wrap;}
  .chip{padding:6px 13px;border-radius:999px;font-size:12.5px;border:1px solid var(--gris-300);background:var(--gris-100);color:var(--gris-600);cursor:pointer;transition:.15s;}
  .chip:hover{border-color:var(--verde);}
  .chip.active{background:var(--verde);border-color:var(--verde);color:white;font-weight:600;}
  select{padding:6px 12px;border-radius:8px;border:1px solid var(--gris-300);background:var(--white);font-size:12.5px;color:var(--gris-900);max-width:220px;}
  .clear-btn{font-size:12px;color:var(--verde-oscuro);background:none;border:none;cursor:pointer;text-decoration:underline;margin-left:auto;}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
  .kpi{background:var(--white);border:1px solid var(--gris-300);border-radius:14px;padding:16px 18px;}
  .kpi .lbl{font-size:12px;color:var(--gris-600);font-weight:600;text-transform:uppercase;letter-spacing:.03em;}
  .kpi .val{font-size:30px;font-weight:700;margin-top:6px;letter-spacing:-0.02em;color:var(--verde-oscuro);}
  .kpi .sub{font-size:12px;color:var(--gris-600);margin-top:4px;}

  .grid2{display:grid;grid-template-columns:1.3fr 1fr;gap:14px;margin-bottom:14px;align-items:start;}
  .grid2b{display:grid;grid-template-columns:0.8fr 1.2fr;grid-template-rows:560px;gap:14px;margin-bottom:14px;}

  .card{background:var(--white);border:1px solid var(--gris-300);border-radius:14px;padding:18px 20px;overflow:hidden;min-width:0;}
  .card h3{margin:0 0 3px;font-size:14px;}
  .card .desc{font-size:11.5px;color:var(--gris-600);margin-bottom:14px;}

  .columna-derecha{display:flex;flex-direction:column;gap:14px;height:100%;min-width:0;}
  .card-hospital{flex:1;min-height:0;display:flex;flex-direction:column;}
  .card-tipo{flex:0 0 auto;}

  .escala-preguntas{display:flex;flex-direction:column;gap:6px;padding-top:4px;}
  .escala-fila{display:grid;grid-template-columns:92px minmax(60px,1fr) 40px;align-items:center;gap:10px;}
  .escala-nombre{font-size:10.5px;color:var(--gris-600);line-height:1.3;}
  .escala-riel{position:relative;height:6px;background:var(--gris-300);border-radius:999px;}
  .escala-relleno{position:absolute;top:0;left:0;height:100%;border-radius:999px;transition:width .25s ease;}
  .escala-valor{font-size:11px;font-weight:700;color:var(--gris-900);white-space:nowrap;}
  .escala-marcas{display:grid;grid-template-columns:92px minmax(60px,1fr) 40px;gap:10px;}
  .escala-marcas-riel{position:relative;height:10px;}
  .escala-marcas-riel span{position:absolute;top:0;transform:translateX(-50%);font-size:10px;color:var(--gris-600);}

  .donut-wrap{display:flex;align-items:center;gap:20px;}
  .donut{width:120px;height:120px;border-radius:50%;flex-shrink:0;position:relative;transition:background .25s ease;}
  .donut::after{content:"";position:absolute;inset:18px;background:var(--white);border-radius:50%;}
  .donut-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;}
  .donut-center b{font-size:19px;}
  .donut-center small{font-size:9.5px;color:var(--gris-600);}
  .legend{display:flex;flex-direction:column;gap:8px;font-size:12.5px;}
  .legend div{display:flex;align-items:center;gap:7px;}
  .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

  .btn-volver-mapa{background:none;border:1px solid var(--gris-300);color:var(--verde-oscuro);font-size:12px;padding:5px 12px;border-radius:999px;cursor:pointer;margin-bottom:10px;}
  .btn-volver-mapa:hover{background:var(--verde-claro);}

  .info-region-fija{display:flex;align-items:center;gap:8px;background:var(--gris-100);border-radius:8px;padding:8px 12px;font-size:12.5px;margin-bottom:10px;}

  .chile-svg{height:460px;max-width:100%;width:auto;display:block;margin:0 auto;}
  .mapa-region{cursor:pointer;stroke:white;stroke-width:0.6;transition:opacity .15s;}
  .mapa-region:hover{opacity:0.75;}
  .mapa-region.activa{stroke:#1c2422;stroke-width:1.6;}
  .mapa-region.sin-datos{cursor:not-allowed;}
  .mapa-region.atenuada{opacity:0.35;}

  #mapa-tooltip{display:none;position:fixed;background:var(--gris-900);color:white;padding:10px 14px;border-radius:8px;font-size:13px;pointer-events:none;z-index:1000;}
  #mapa-tooltip .mapa-tooltip-titulo{font-weight:700;display:flex;align-items:center;gap:7px;}
  #mapa-tooltip .mapa-tooltip-swatch{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  #mapa-tooltip .mapa-tooltip-datos{margin-top:4px;color:rgba(255,255,255,.75);}

  table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:6px;}
  th{text-align:left;color:var(--gris-600);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.03em;padding:8px 6px;border-bottom:1px solid var(--gris-300);position:sticky;top:0;background:var(--white);}
  td{padding:9px 6px;border-bottom:1px solid var(--gris-100);}
  .num{text-align:center;}
  .tag{font-size:11px;padding:3px 9px;border-radius:999px;font-weight:600;}
  .tag.convenio{background:var(--verde-claro);color:var(--verde-oscuro);}
  .tag.terreno{background:#fdf1e4;color:#a5691a;}
  .tag.otro{background:var(--gris-100);color:var(--gris-600);}
  .scroll-table{flex:1;min-height:0;overflow-y:auto;overflow-x:auto;}
  .tabla-x{overflow-x:auto;}
  .promedio-pill{font-weight:700;padding:2px 8px;border-radius:6px;font-size:11.5px;color:white;display:inline-block;}

  .foot{margin-top:18px;font-size:11px;color:var(--gris-600);text-align:center;}
  .msg{padding:40px;text-align:center;color:var(--gris-600);font-size:13px;}
  .err{color:var(--rojo);}
  #contenido.cargando{opacity:0.4;pointer-events:none;transition:opacity .2s;}

  @media (max-width:860px){
    .topbar{justify-content:flex-start;}
    .period{flex:1 1 100%;justify-content:center;flex-wrap:wrap;}

    .escala-fila,.escala-marcas{grid-template-columns:70px minmax(50px,1fr) 32px;gap:6px;}

    .grid2b{grid-template-columns:1fr;grid-template-rows:auto;}
    .chile-svg{height:320px;}

    .scroll-table{max-height:320px;overflow-x:hidden;}
    .tabla-x{overflow-x:hidden;}
    .scroll-table table,.tabla-x table{table-layout:fixed;width:100%;}
    .scroll-table th.num,.tabla-x th.num{width:18%;}
    .scroll-table td,.scroll-table th,.tabla-x td,.tabla-x th{overflow-wrap:break-word;word-break:break-word;}

    .donut-wrap{flex-wrap:wrap;justify-content:center;}

    .brand{flex-direction:column;align-items:flex-start;gap:6px;}
  }

  @media (max-width:480px){
    .kpis{grid-template-columns:repeat(2,1fr);}
    .kpi .lbl{font-size:11px;line-height:1.3;}
    .kpi .val{font-size:24px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <div class="brand-mark" onclick="limpiarFiltros();"><img src="logo-msoluciones.png" alt="MSoluciones"></div>
      <div class="brand-text">
        <h1>Encuesta de Satisfacción — Convenios y Terreno</h1>
        <p>Dashboard interno — filtros instantáneos, sin recargar</p>
      </div>
    </div>
    <div class="period">
      <span id="ultima-act">Cargando…</span>
      <span id="velocidad" style="color:var(--verde);font-weight:600;"></span>
      <button class="refresh-btn" id="btn-actualizar" onclick="cargarDatos()">Actualizar</button>
    </div>
  </div>

  <div class="filters">
    <div class="filtro-grupo">
      <span class="label">Tipo</span>
      <div class="chip-group" id="chips-tipo">
        <span class="chip active" data-tipo="">Todos</span>
        <span class="chip" data-tipo="convenio">Convenio</span>
        <span class="chip" data-tipo="terreno">Terreno</span>
      </div>
    </div>
    <div class="filtro-grupo">
      <span class="label">Región</span>
      <select id="select-region"><option value="">Todas las regiones</option></select>
    </div>
    <div class="filtro-grupo">
      <span class="label">Hospital / Centro</span>
      <select id="select-empresa"><option value="">Todas</option></select>
    </div>
    <button class="clear-btn" onclick="limpiarFiltros()">Limpiar filtros</button>
  </div>

  <div id="contenido">
    <div class="msg">Cargando datos…</div>
  </div>

  <div class="foot">Dashboard de uso interno — incluye desglose por Hospital/Costo</div>
</div>

<div id="mapa-tooltip"></div>

let todasLasRespuestas = [];
let ultimaActualizacion = null;
let filtroTipo = "";
let filtroRegion = "";
let filtroEmpresa = "";

function tagClase(tipo){
  const t = (tipo||"").toLowerCase();
  if (t === "convenio") return "convenio";
  if (t === "terreno") return "terreno";
  return "otro";
}

function colorPorPromedio(p){
  if (p >= 4.5) return "var(--verde-oscuro)";
  if (p >= 3.5) return "var(--verde)";
  if (p >= 2.5) return "var(--ambar)";
  return "var(--rojo)";
}

function posEscala(v){
  return (v - 1) / (5 - 1) * 100;
}

function poblarSelect(id, valores, placeholder){
  const sel = document.getElementById(id);
  const actual = sel.value;
  sel.innerHTML = `<option value="">${placeholder}</option>` +
    [...new Set(valores)].sort((a,b)=>a.localeCompare(b,'es')).map(v => `<option value="${v}">${v}</option>`).join('');
  sel.value = actual;
}

function generarMapaSvg(porRegion){
  const regionesConDatos = new Set(todasLasRespuestas.map(r => r.region));
  const paths = Object.keys(CHILE_REGION_PATHS).map(nombreRegion => {
    const match = porRegion.find(r => r.region === nombreRegion);
    const color = match ? colorPorPromedio(match.promedio) : 'var(--gris-300)';
    const activa = filtroRegion === nombreRegion ? ' activa' : '';
    const sinDatos = regionesConDatos.has(nombreRegion) ? '' : ' sin-datos';
    const atenuada = (filtroRegion && filtroRegion !== nombreRegion) ? ' atenuada' : '';
    const datosAttrs = match ? ` data-promedio="${match.promedio}" data-respuestas="${match.totalRespuestas}"` : '';
    return `<path class="mapa-region${activa}${sinDatos}${atenuada}" data-region="${nombreRegion}" data-color="${color}"${datosAttrs} d="${CHILE_REGION_PATHS[nombreRegion]}" fill="${color}"></path>`;
  }).join('');
  return `<svg class="chile-svg" viewBox="0 0 ${CHILE_MAP_WIDTH} ${CHILE_MAP_HEIGHT}" preserveAspectRatio="xMidYMid meet">${paths}</svg>`;
}

function agregar(rows){
  const total = rows.length;
  let sumQ1=0,sumQ2=0,sumQ3=0,sumQ4=0;
  let promotores=0,pasivos=0,detractores=0;
  let sumNps=0,countNps=0;
  const regionMap={}, tipoMap={}, empresaMap={};

  rows.forEach(r=>{
    sumQ1+=r.q1; sumQ2+=r.q2; sumQ3+=r.q3; sumQ4+=r.q4;
    const nps = r.nps;
    if (!isNaN(nps)) {
      if (nps>=9) promotores++;
      else if (nps>=7) pasivos++;
      else detractores++;
      sumNps+=nps; countNps++;
    }
    [[regionMap, r.region],[tipoMap, r.tipo],[empresaMap, r.empresa]].forEach(([map,key])=>{
      if(!map[key]) map[key]={total:0,sumProm:0,sumNps:0,countNps:0};
      const m = map[key];
      m.total++;
      m.sumProm += (r.q1+r.q2+r.q3+r.q4)/4;
      if(!isNaN(nps)){ m.sumNps+=nps; m.countNps++; }
    });
    if (empresaMap[r.empresa].region === undefined) empresaMap[r.empresa].region = r.region;
  });

  const promedioGeneral = total ? (sumQ1+sumQ2+sumQ3+sumQ4)/(4*total) : 0;
  const npsScore = total ? Math.round(((promotores-detractores)/total)*100) : 0;
  const promedioNps = countNps ? Number((sumNps/countNps).toFixed(1)) : 0;

  function mapToArray(map,keyName){
    return Object.keys(map).map(k=>{
      const m = map[k];
      const obj = {};
      obj[keyName]=k;
      obj.totalRespuestas = m.total;
      obj.promedio = Number((m.sumProm/m.total).toFixed(2));
      obj.nps = m.countNps ? Math.round((m.sumNps/m.countNps)*10)/10 : null;
      if (m.region !== undefined) obj.region = m.region;
      return obj;
    });
  }

  return {
    totalRespuestas: total,
    promedioGeneral: Number(promedioGeneral.toFixed(2)),
    promedioPorPregunta: {
      q1: total ? Number((sumQ1/total).toFixed(2)) : 0,
      q2: total ? Number((sumQ2/total).toFixed(2)) : 0,
      q3: total ? Number((sumQ3/total).toFixed(2)) : 0,
      q4: total ? Number((sumQ4/total).toFixed(2)) : 0
    },
    nps: { score: npsScore, promedio: promedioNps, promotores, pasivos, detractores },
    porRegion: mapToArray(regionMap,"region"),
    porTipo: mapToArray(tipoMap,"tipo"),
    porEmpresa: mapToArray(empresaMap,"empresa")
  };
}

function limpiarFiltros(){
  filtroTipo = ""; filtroRegion = ""; filtroEmpresa = "";
  document.querySelectorAll('#chips-tipo .chip').forEach(c => c.classList.toggle('active', c.dataset.tipo === ""));
  document.getElementById('select-region').value = "";
  document.getElementById('select-empresa').value = "";
  aplicarFiltros();
}

// Filtra el arreglo que ya tenemos en memoria y vuelve a dibujar —
// no llama a internet, por eso es instantáneo.
function aplicarFiltros(){
  const inicio = performance.now();
  let filtradas = todasLasRespuestas;
  if (filtroTipo) filtradas = filtradas.filter(r => (r.tipo||"").toLowerCase().trim() === filtroTipo);
  if (filtroRegion) filtradas = filtradas.filter(r => r.region === filtroRegion);
  if (filtroEmpresa) filtradas = filtradas.filter(r => r.empresa === filtroEmpresa);

  // El mapa ignora el filtro de región a propósito: es él quien lo controla,
  // así que no puede quedar atrapado dentro de su propio resultado.
  let filtradasMapa = todasLasRespuestas;
  if (filtroTipo) filtradasMapa = filtradasMapa.filter(r => (r.tipo||"").toLowerCase().trim() === filtroTipo);
  if (filtroEmpresa) filtradasMapa = filtradasMapa.filter(r => r.empresa === filtroEmpresa);

  render(agregar(filtradas), agregar(filtradasMapa));
  const ms = Math.round(performance.now() - inicio);
  document.getElementById('velocidad').textContent = `filtrado en ${ms} ms`;
}

  const textoOriginal = btn.textContent;
  contenido.classList.add('cargando');
  document.getElementById('velocidad').textContent = '';
  btn.disabled = true;
  btn.textContent = 'Actualizando…';
  try {
    const resp = await fetch(URL_SCRIPT);
    if (!resp.ok) throw new Error("Respuesta no válida del servidor (" + resp.status + ")");
    const json = await resp.json();
    todasLasRespuestas = json.respuestas || [];
    ultimaActualizacion = json.ultimaActualizacion;
    document.getElementById('ultima-act').textContent = "Actualizado: " + new Date(ultimaActualizacion).toLocaleString('es-CL');

    poblarSelect('select-region', todasLasRespuestas.map(r=>r.region), "Todas las regiones");
    poblarSelect('select-empresa', todasLasRespuestas.map(r=>r.empresa), "Todas");

    aplicarFiltros();
  } catch (err) {
    contenido.innerHTML =
      '<div class="msg err">No se pudieron cargar los datos.<br>' + err.message + '</div>';
  } finally {
    contenido.classList.remove('cargando');
    btn.disabled = false;
    btn.textContent = textoOriginal;
  }
}

document.getElementById('chips-tipo').addEventListener('click', (e) => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  filtroTipo = chip.dataset.tipo;
  document.querySelectorAll('#chips-tipo .chip').forEach(c => c.classList.toggle('active', c === chip));
  aplicarFiltros();
});
document.getElementById('select-region').addEventListener('change', (e) => {
  filtroRegion = e.target.value;
  aplicarFiltros();
});
document.getElementById('select-empresa').addEventListener('change', (e) => {
  filtroEmpresa = e.target.value;
  aplicarFiltros();
});
document.getElementById('contenido').addEventListener('click', (e) => {
  if (e.target.closest('.btn-volver-mapa')) {
    filtroRegion = "";
    document.getElementById('select-region').value = "";
    aplicarFiltros();
    return;
  }
  const region = e.target.closest('.mapa-region');
  if (!region) return;
  if (region.classList.contains('sin-datos')) return;
  const nombreRegion = region.dataset.region;
  filtroRegion = (filtroRegion === nombreRegion) ? "" : nombreRegion;
  document.getElementById('select-region').value = filtroRegion;
  aplicarFiltros();
});

const mapaTooltip = document.getElementById('mapa-tooltip');

function posicionarTooltip(x, y){
  mapaTooltip.style.left = (x + 14) + 'px';
  mapaTooltip.style.top = (y + 14) + 'px';
}

document.getElementById('contenido').addEventListener('mouseover', (e) => {
  const region = e.target.closest('.mapa-region');
  if (!region) return;
  const cuerpo = region.dataset.promedio !== undefined
    ? `Promedio ${region.dataset.promedio} — ${region.dataset.respuestas} respuesta(s)`
    : (region.classList.contains('sin-datos') ? 'Sin datos todavía' : 'Sin datos con este filtro');
  mapaTooltip.innerHTML = `<div class="mapa-tooltip-titulo"><span class="mapa-tooltip-swatch" style="background:${region.dataset.color};"></span>${region.dataset.region}</div><div class="mapa-tooltip-datos">${cuerpo}</div>`;
  mapaTooltip.style.display = 'block';
  posicionarTooltip(e.clientX, e.clientY);
});
document.getElementById('contenido').addEventListener('mousemove', (e) => {
  if (mapaTooltip.style.display === 'none') return;
  if (!e.target.closest('.mapa-region')) return;
  posicionarTooltip(e.clientX, e.clientY);
});
document.getElementById('contenido').addEventListener('mouseout', (e) => {
  if (!e.target.closest('.mapa-region')) return;
  mapaTooltip.style.display = 'none';
});

cargarDatos();
</script>
</body>
</html>
